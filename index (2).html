<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>صور الطلاب - قويسنا</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Tahoma, Arial, sans-serif; background: #f0f2f5; color: #333; }
  
  header {
    background: linear-gradient(135deg, #1a3c5e, #2d6a9f);
    color: white;
    padding: 20px 30px;
    text-align: center;
    box-shadow: 0 3px 10px rgba(0,0,0,0.3);
  }
  header h1 { font-size: 1.8rem; margin-bottom: 5px; }
  header p { font-size: 0.9rem; opacity: 0.85; }

  .controls {
    display: flex;
    gap: 12px;
    padding: 16px 24px;
    background: white;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    flex-wrap: wrap;
    align-items: center;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .controls label { font-weight: bold; font-size: 0.9rem; }
  .year-btn {
    padding: 7px 18px;
    border: 2px solid #2d6a9f;
    background: white;
    color: #2d6a9f;
    border-radius: 20px;
    cursor: pointer;
    font-size: 0.88rem;
    font-weight: bold;
    transition: all 0.2s;
  }
  .year-btn:hover, .year-btn.active {
    background: #2d6a9f;
    color: white;
  }
  .search-box {
    padding: 7px 14px;
    border: 2px solid #ccc;
    border-radius: 20px;
    font-size: 0.88rem;
    outline: none;
    width: 160px;
    transition: border-color 0.2s;
  }
  .search-box:focus { border-color: #2d6a9f; }
  .count-label {
    margin-right: auto;
    font-size: 0.85rem;
    color: #666;
    font-weight: bold;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 14px;
    padding: 20px 24px;
  }

  .card {
    background: white;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    transition: transform 0.2s, box-shadow 0.2s;
    text-align: center;
  }
  .card:hover {
    transform: translateY(-4px);
    box-shadow: 0 6px 16px rgba(0,0,0,0.18);
  }
  .card img {
    width: 100%;
    height: 160px;
    object-fit: cover;
    display: block;
    background: #e8edf2;
  }
  .card img.error {
    object-fit: contain;
    padding: 10px;
    filter: grayscale(1) opacity(0.4);
  }
  .card-info {
    padding: 8px 6px 10px;
  }
  .card-id {
    font-size: 1.05rem;
    font-weight: bold;
    color: #1a3c5e;
    letter-spacing: 1px;
  }
  .card-year {
    display: inline-block;
    margin-top: 4px;
    background: #e8f0f8;
    color: #2d6a9f;
    font-size: 0.75rem;
    font-weight: bold;
    padding: 2px 10px;
    border-radius: 10px;
  }

  .load-more {
    display: block;
    margin: 10px auto 30px;
    padding: 10px 36px;
    background: #2d6a9f;
    color: white;
    border: none;
    border-radius: 25px;
    font-size: 1rem;
    cursor: pointer;
    font-weight: bold;
    transition: background 0.2s;
  }
  .load-more:hover { background: #1a3c5e; }
  .load-more:disabled { background: #aaa; cursor: not-allowed; }

  .no-results {
    text-align: center;
    padding: 60px;
    color: #999;
    font-size: 1.1rem;
  }
</style>
</head>
<body>

<header>
  <h1>📋 صور الطلاب - معهد قويسنا</h1>
  <p>عرض صور الطلاب حسب السنة الدراسية</p>
</header>

<div class="controls">
  <label>السنة:</label>
  <button class="year-btn active" onclick="filterYear('all')">الكل</button>
  <button class="year-btn" onclick="filterYear('2020')">2020</button>
  <button class="year-btn" onclick="filterYear('2021')">2021</button>
  <button class="year-btn" onclick="filterYear('2022')">2022</button>
  <button class="year-btn" onclick="filterYear('2023')">2023</button>
  <button class="year-btn" onclick="filterYear('2024')">2024</button>
  <button class="year-btn" onclick="filterYear('2025')">2025</button>
  <input class="search-box" type="text" placeholder="ابحث بالـ ID..." oninput="searchById(this.value)" />
  <span class="count-label" id="countLabel"></span>
</div>

<div class="grid" id="grid"></div>
<button class="load-more" id="loadMoreBtn" onclick="loadMore()">تحميل المزيد</button>
<p class="no-results" id="noResults" style="display:none">لا توجد نتائج</p>

  currentYear = year;
  document.querySelectorAll('.year-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  applyFilters();
}

function searchById(val) {
  currentSearch = val.trim();
  applyFilters();
}

function applyFilters() {
  filtered = ALL_DATA.filter(item => {
    const yearOk = currentYear === 'all' || item.year === currentYear;
    const idOk = !currentSearch || item.id.includes(currentSearch);
    return yearOk && idOk;
  });
  displayed = 0;
  document.getElementById('grid').innerHTML = '';
  document.getElementById('noResults').style.display = filtered.length === 0 ? 'block' : 'none';
  document.getElementById('loadMoreBtn').style.display = filtered.length === 0 ? 'none' : 'block';
  updateCount();
  loadMore();
}

function loadMore() {
  const grid = document.getElementById('grid');
  const chunk = filtered.slice(displayed, displayed + PAGE_SIZE);
  chunk.forEach(item => {
    const card = document.createElement('div');
    card.className = 'card';
    // Convert HTTP to HTTPS using img-proxy
    let imgUrl = item.url;
    if (imgUrl && imgUrl.startsWith('http://')) {
      imgUrl = imgUrl.replace('http://', '/img-proxy/');
    }
    card.innerHTML = `
      <img src="${imgUrl}" alt="ID ${item.id}" loading="lazy"
           onerror="this.src='https://via.placeholder.com/150x160?text=No+Image'; this.classList.add('error')">
      <div class="card-info">
        <div class="card-id">${item.id}</div>
        <span class="card-year">${item.year}</span>
      </div>
    `;
    grid.appendChild(card);
  });
  displayed += chunk.length;
  const btn = document.getElementById('loadMoreBtn');
  if (displayed >= filtered.length) {
    btn.disabled = true;
    btn.textContent = 'تم عرض الكل';
  } else {
    btn.disabled = false;
    btn.textContent = `تحميل المزيد (${filtered.length - displayed} متبقي)`;
  }
  updateCount();
}

function updateCount() {
  document.getElementById('countLabel').textContent = `إجمالي: ${filtered.length} صورة | معروض: ${Math.min(displayed, filtered.length)}`;
}

// Init
applyFilters();
</script>
</body>
</html>
