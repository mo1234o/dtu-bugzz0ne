<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم الأدمن - بوابة الطلاب</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 2.5em;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        .stat-card h3 {
            font-size: 1em;
            margin-bottom: 10px;
            opacity: 0.9;
        }

        .stat-card .number {
            font-size: 2.5em;
            font-weight: bold;
        }

        .filters {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 15px;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
        }

        .filter-group label {
            font-weight: bold;
            margin-bottom: 8px;
            color: #333;
        }

        .filter-group select,
        .filter-group input {
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        .filter-group select:focus,
        .filter-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .filter-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .filter-buttons button {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }

        .filter-buttons .apply {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .filter-buttons .reset {
            background: #dc3545;
            color: white;
        }

        .filter-buttons button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .results-info {
            background: #e3f2fd;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
            font-weight: bold;
            color: #1976d2;
        }

        .students-table {
            overflow-x: auto;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        thead {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        th, td {
            padding: 15px;
            text-align: right;
            border-bottom: 1px solid #ddd;
        }

        th {
            font-weight: bold;
            white-space: nowrap;
        }

        tbody tr:hover {
            background: #f8f9fa;
        }

        .student-img {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #667eea;
        }

        .grade-excellent {
            background: #d4edda;
            color: #155724;
            padding: 5px 10px;
            border-radius: 5px;
            font-weight: bold;
        }

        .grade-very-good {
            background: #cce5ff;
            color: #004085;
            padding: 5px 10px;
            border-radius: 5px;
            font-weight: bold;
        }

        .grade-good {
            background: #fff3cd;
            color: #856404;
            padding: 5px 10px;
            border-radius: 5px;
            font-weight: bold;
        }

        .grade-acceptable {
            background: #f8d7da;
            color: #721c24;
            padding: 5px 10px;
            border-radius: 5px;
            font-weight: bold;
        }

        .grade-fail {
            background: #f5c6cb;
            color: #721c24;
            padding: 5px 10px;
            border-radius: 5px;
            font-weight: bold;
        }

        .loading {
            text-align: center;
            padding: 40px;
            font-size: 1.5em;
            color: #667eea;
        }

        .no-results {
            text-align: center;
            padding: 40px;
            font-size: 1.2em;
            color: #999;
        }

        @media (max-width: 768px) {
            .container {
                padding: 15px;
            }

            h1 {
                font-size: 1.8em;
            }

            .stats {
                grid-template-columns: 1fr;
            }

            .filters {
                grid-template-columns: 1fr;
            }

            th, td {
                padding: 10px;
                font-size: 0.9em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎓 لوحة تحكم الأدمن - بوابة الطلاب</h1>
        
        <div class="stats">
            <div class="stat-card">
                <h3>إجمالي الطلاب</h3>
                <div class="number" id="totalStudents">0</div>
            </div>
            <div class="stat-card">
                <h3>الطلاب المعروضين</h3>
                <div class="number" id="displayedStudents">0</div>
            </div>
            <div class="stat-card">
                <h3>عدد التخصصات</h3>
                <div class="number" id="totalPrograms">0</div>
            </div>
            <div class="stat-card">
                <h3>عدد السنوات</h3>
                <div class="number" id="totalYears">0</div>
            </div>
        </div>

        <div class="filters">
            <div class="filter-group">
                <label for="programFilter">التخصص:</label>
                <select id="programFilter">
                    <option value="">جميع التخصصات</option>
                </select>
            </div>
            <div class="filter-group">
                <label for="yearFilter">السنة الدراسية:</label>
                <select id="yearFilter">
                    <option value="">جميع السنوات</option>
                </select>
            </div>
            <div class="filter-group">
                <label for="levelFilter">المستوى:</label>
                <select id="levelFilter">
                    <option value="">جميع المستويات</option>
                </select>
            </div>
            <div class="filter-group">
                <label for="searchFilter">بحث بالاسم أو الرقم:</label>
                <input type="text" id="searchFilter" placeholder="أدخل اسم الطالب أو الرقم...">
            </div>
            <div class="filter-buttons">
                <button class="apply" onclick="applyFilters()">تطبيق الفلتر</button>
                <button class="reset" onclick="resetFilters()">إعادة تعيين</button>
            </div>
        </div>

        <div class="results-info" id="resultsInfo"></div>

        <div class="students-table">
            <table id="studentsTable">
                <thead>
                    <tr>
                        <th>صورة</th>
                        <th>الرقم</th>
                        <th>الاسم</th>
                        <th>التخصص</th>
                        <th>المستوى</th>
                        <th>السنة</th>
                        <th>النسبة المئوية</th>
                        <th>التقدير</th>
                    </tr>
                </thead>
                <tbody id="studentsBody">
                    <tr>
                        <td colspan="8" class="loading">جاري تحميل البيانات...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        let allStudents = [];
        let filteredStudents = [];

        // Load data from db.json
        async function loadData() {
            try {
                const response = await fetch('db.json');
                allStudents = await response.json();
                // Convert to array for easier filtering
                allStudents = Object.values(allStudents);
                filteredStudents = [...allStudents];
                
                populateFilters();
                updateStats();
                displayStudents();
            } catch (error) {
                console.error('Error loading data:', error);
                document.getElementById('studentsBody').innerHTML = 
                    '<tr><td colspan="8" class="no-results">حدث خطأ في تحميل البيانات</td></tr>';
            }
        }

        // Populate filter dropdowns
        function populateFilters() {
            const programs = new Set();
            const years = new Set();
            const levels = new Set();

            allStudents.forEach(student => {
                Object.values(student.years || {}).forEach(yearInfo => {
                    if (yearInfo.p) programs.add(yearInfo.p);
                    if (yearInfo.l) levels.add(yearInfo.l);
                });
                Object.keys(student.years || {}).forEach(year => years.add(year));
            });

            const programFilter = document.getElementById('programFilter');
            programs.forEach(program => {
                const option = document.createElement('option');
                option.value = program;
                option.textContent = program;
                programFilter.appendChild(option);
            });

            const yearFilter = document.getElementById('yearFilter');
            years.sort().forEach(year => {
                const option = document.createElement('option');
                option.value = year;
                option.textContent = year;
                yearFilter.appendChild(option);
            });

            const levelFilter = document.getElementById('levelFilter');
            levels.forEach(level => {
                const option = document.createElement('option');
                option.value = level;
                option.textContent = level;
                levelFilter.appendChild(option);
            });

            document.getElementById('totalPrograms').textContent = programs.size;
            document.getElementById('totalYears').textContent = years.size;
        }

        // Update statistics
        function updateStats() {
            document.getElementById('totalStudents').textContent = allStudents.length;
            document.getElementById('displayedStudents').textContent = filteredStudents.length;
        }

        // Apply filters
        function applyFilters() {
            const program = document.getElementById('programFilter').value;
            const year = document.getElementById('yearFilter').value;
            const level = document.getElementById('levelFilter').value;
            const search = document.getElementById('searchFilter').value.toLowerCase();

            filteredStudents = Object.values(allStudents).filter(student => {
                let matches = true;

                if (program) {
                    const hasProgram = Object.values(student.years || {}).some(
                        yearInfo => yearInfo.p === program
                    );
                    if (!hasProgram) matches = false;
                }

                if (year && matches) {
                    if (!student.years || !student.years[year]) matches = false;
                }

                if (level && matches) {
                    const hasLevel = Object.values(student.years || {}).some(
                        yearInfo => yearInfo.l === level
                    );
                    if (!hasLevel) matches = false;
                }

                if (search && matches) {
                    const id = student.id ? student.id.toLowerCase() : '';
                    if (!id.includes(search)) matches = false;
                }

                return matches;
            });

            updateStats();
            displayStudents();
        }

        // Reset filters
        function resetFilters() {
            document.getElementById('programFilter').value = '';
            document.getElementById('yearFilter').value = '';
            document.getElementById('levelFilter').value = '';
            document.getElementById('searchFilter').value = '';
            
            filteredStudents = [...allStudents];
            updateStats();
            displayStudents();
        }

        // Display students in table
        function displayStudents() {
            const tbody = document.getElementById('studentsBody');
            const resultsInfo = document.getElementById('resultsInfo');

            if (filteredStudents.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" class="no-results">لا توجد نتائج مطابقة</td></tr>';
                resultsInfo.textContent = '';
                return;
            }

            resultsInfo.textContent = `عرض ${filteredStudents.length} من ${allStudents.length} طالب`;

            tbody.innerHTML = filteredStudents.map(student => {
                const latestYear = getLatestYear(student);
                const yearInfo = student.years && student.years[latestYear] ? student.years[latestYear] : {};
                
                const gradeClass = getGradeClass(student.cum && student.cum.letter);
                
                // Convert HTTP image URL to HTTPS using img-proxy
                let imgUrl = student.img || '';
                if (imgUrl && imgUrl.startsWith('http://')) {
                    imgUrl = imgUrl.replace('http://', '/img-proxy/');
                }
                
                return `
                    <tr>
                        <td>
                            <img src="${imgUrl}" alt="صورة الطالب" class="student-img" 
                                 onerror="this.src='https://via.placeholder.com/60?text=?'">
                        </td>
                        <td>${student.id || '-'}</td>
                        <td>طالب ${student.id || '-'}</td>
                        <td>${yearInfo.p || '-'}</td>
                        <td>${yearInfo.l || '-'}</td>
                        <td>${latestYear || '-'}</td>
                        <td>${student.cum && student.cum.pct ? student.cum.pct + '%' : '-'}</td>
                        <td><span class="${gradeClass}">${student.cum && student.cum.letter ? student.cum.letter : '-'}</span></td>
                    </tr>
                `;
            }).join('');
        }

        // Get latest year for a student
        function getLatestYear(student) {
            if (!student.years) return '';
            const years = Object.keys(student.years);
            return years.sort().reverse()[0] || '';
        }

        // Get grade CSS class
        function getGradeClass(grade) {
            if (!grade) return '';
            grade = grade.toLowerCase();
            if (grade.includes('ممتاز')) return 'grade-excellent';
            if (grade.includes('جيد جدا')) return 'grade-very-good';
            if (grade.includes('جيد')) return 'grade-good';
            if (grade.includes('مقبول')) return 'grade-acceptable';
            if (grade.includes('راسب') || grade.includes('محروم')) return 'grade-fail';
            return '';
        }

        // Initialize
        loadData();
    </script>
</body>
</html>
